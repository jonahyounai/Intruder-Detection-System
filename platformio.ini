; ============================================================
;  PlatformIO config - ESP32 Intruder Detection System
;  Goes in your project ROOT (replace the auto-generated one).
; ============================================================
[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200

; Libraries - PlatformIO downloads these automatically on first build.
; No manual installing.
lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    madhephaestus/ESP32Servo
    